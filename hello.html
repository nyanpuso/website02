<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Loading Sequence</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #00ffab;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* 読み込み完了までスクロール禁止 */
        }

        /* 1画面目のコンテナ */
        .hero-section {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        /* 画像を表示する枠 */
        .image-frame {
            width: 80%;
            max-width: 600px;
            height: 350px;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #222, #2a2a2a);
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0; /* 最初は隠しておく */
            transition: opacity 1.5s ease-in-out;
        }

        /* タイピングテキストの枠 */
        .text-frame {
            height: 3rem;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 0.2rem;
        }

        /* タイピングアニメーションのクラス */
        .typing {
            border-right: 3px solid var(--accent-color);
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
            animation: blink 0.7s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--accent-color); }
        }

        /* ロード中インジケーター（任意） */
        #loader {
            position: absolute;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="image-frame">
            <span id="loader">Loading Resources...</span>
            <img id="main-image" src="https://picsum.photos/1200/800" alt="Main Visual">
        </div>

        <div class="text-frame">
            <span id="typing-target"></span>
        </div>
    </section>

    <script>
        const mainImage = document.getElementById('main-image');
        const loader = document.getElementById('loader');
        const typingTarget = document.getElementById('typing-target');
        const welcomeText = "ようこそ";

        // すべてのリソース（画像含む）が読み込まれたら実行
        window.addEventListener('load', () => {
            // 1. ローダーを消して画像を表示
            loader.style.display = 'none';
            mainImage.style.opacity = '1';

            // 2. 画像のフェードインが終わる頃にタイピングを開始
            setTimeout(() => {
                startTyping(welcomeText);
            }, 1000);
        });

        function startTyping(text) {
            typingTarget.classList.add('typing');
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    typingTarget.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 200); // タイピング速度（ミリ秒）
                } else {
                    // タイピング終了後、カーソルの点滅を止める場合は以下
                    // typingTarget.style.borderRight = 'none';
                    
                    // ここでスクロールスナップ機能を有効化する等の処理へ
                    document.body.style.overflow = 'auto'; 
                }
            }
            type();
        }
    </script>
</body>
</html>
