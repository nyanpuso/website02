<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider Test</title>
<style>
    body { background: #333; color: #fff; font-family: sans-serif; margin:0; padding:0;}
    #slider-wrapper { width: 400px; margin: 50px auto; position: relative; overflow: hidden; border: 1px solid #ccc; }
    .slider-viewport { width: 100%; height: 200px; position: relative; }
    #slider-track { display: flex; transition: transform 0.3s ease; }
    .slider-item { flex-shrink: 0; width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 20px; background: #555; }
    .slider-button { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(255,255,255,0.7); border:none; border-radius:50%; cursor:pointer; font-size: 24px; display:flex; align-items:center; justify-content:center; }
    .slider-btn-prev { left: 5px; }
    .slider-btn-next { right: 5px; }
</style>
</head>
<body>

<div id="slider-wrapper">
    <div class="slider-viewport">
        <div id="slider-track">
            <div class="slider-item">Slide 1</div>
            <div class="slider-item">Slide 2</div>
            <div class="slider-item">Slide 3</div>
        </div>
    </div>
    <button id="prev-btn" class="slider-button slider-btn-prev">&lt;</button>
    <button id="next-btn" class="slider-button slider-btn-next">&gt;</button>
</div>

<script type="module">
let currentIndex = 0;
const track = document.getElementById('slider-track');

function updateSlider() {
    if(track) track.style.transform = `translateX(-${currentIndex * 100}%)`;
}

document.getElementById('prev-btn')?.addEventListener('click', () => {
    currentIndex = (currentIndex - 1 + 3) % 3;
    updateSlider();
});

document.getElementById('next-btn')?.addEventListener('click', () => {
    currentIndex = (currentIndex + 1) % 3;
    updateSlider();
});

// デバッグパネル表示用サンプル（簡易版）
import { StyleDebugger } from './dist/utils/styleDebugger.js';

new StyleDebugger([
    { selector: '#slider-wrapper', props: ['display','visibility','width','height','zIndex'] },
    { selector: '#slider-track', props: ['transform'] },
]);
</script>

</body>
</html>
