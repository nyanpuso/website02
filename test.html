<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗マップ＋イベントUI</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* レイアウト */
.map-layout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

@media (min-width: 768px) {
  .map-layout {
    flex-direction: row;
  }
}

/* 地図 */
.map-wrapper {
  flex: 1;
  position: relative;
}

.map {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 2px;
  background: #eee;
  height: 100%;
  padding: 10px;
}

.cell {
  background: white;
  border: 1px solid #ccc;
}

/* 店舗ハイライト */
.cell.active {
  background: gold;
}

/* イベント点滅 */
.cell.event {
  background: rgba(255, 0, 0, 0.3);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* ラベル */
.labels {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.label {
  position: absolute;
  background: #ffcc00;
  border-radius: 999px;
  padding: 2px 10px;
  font-size: 12px;
  transform: translate(-50%, -50%);
  pointer-events: auto;
  cursor: pointer;
}

/* 右エリア */
.right-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  border-left: 2px solid #333;
}

/* 店舗一覧 */
.shop-list {
  padding: 10px;
}

.shop-item {
  background: #eee;
  border-radius: 999px;
  padding: 8px 12px;
  margin-bottom: 8px;
  cursor: pointer;
}

/* イベント一覧 */
.event-item {
  background: #ff4444;
  color: white;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  cursor: pointer;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* 詳細 */
.shop-detail {
  position: absolute;
  inset: 0;
  background: white;
  transform: translateX(100%);
  transition: transform 0.3s;
  padding: 16px;
}

.shop-detail.active {
  transform: translateX(0);
}

.close-btn {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="map-layout">

  <div class="map-wrapper">
    <div id="map" class="map"></div>
    <div id="labels" class="labels"></div>
  </div>

  <div class="right-panel">
    <div id="list" class="shop-list"></div>
    <div id="events"></div>
    <div id="detail" class="shop-detail"></div>
  </div>

</div>

<script>
let areas = {};
let shops = [];
let events = [];

const mapEl = document.getElementById("map");
const labelsEl = document.getElementById("labels");
const listEl = document.getElementById("list");
const eventsEl = document.getElementById("events");
const detailEl = document.getElementById("detail");

/* ===== グリッド ===== */
function createGrid() {
  for (let y = 0; y < 6; y++) {
    for (let x = 0; x < 10; x++) {
      const div = document.createElement("div");
      div.className = "cell";
      div.dataset.x = x;
      div.dataset.y = y;
      mapEl.appendChild(div);
    }
  }
}

/* ===== エリア処理 ===== */
function getCells(area) {
  if (!area) return [];

  if (area.type === "rect") {
    const cells = [];
    for (let y = area.y; y < area.y + area.h; y++) {
      for (let x = area.x; x < area.x + area.w; x++) {
        cells.push({ x, y });
      }
    }
    return cells;
  }

  if (area.type === "cells") {
    return area.cells;
  }

  return [];
}

/* ===== ハイライト共通 ===== */
function highlightArea(areaId) {
  document.querySelectorAll(".cell").forEach(c => {
    c.classList.remove("active");
  });

  const cells = getCells(areas[areaId]);

  cells.forEach(pos => {
    const cell = document.querySelector(
      `[data-x="${pos.x}"][data-y="${pos.y}"]`
    );
    if (cell) cell.classList.add("active");
  });
}

/* ===== イベント常時表示 ===== */
function markEventAreas() {
  events.forEach(event => {
    const cells = getCells(areas[event.area]);

    cells.forEach(pos => {
      const cell = document.querySelector(
        `[data-x="${pos.x}"][data-y="${pos.y}"]`
      );
      if (cell) cell.classList.add("event");
    });
  });
}

/* ===== ラベル ===== */
function getCenter(area) {
  const cells = getCells(area);
  const avgX = cells.reduce((s, c) => s + c.x, 0) / cells.length;
  const avgY = cells.reduce((s, c) => s + c.y, 0) / cells.length;
  return { x: avgX, y: avgY };
}

function toPixel(pos) {
  const rect = mapEl.getBoundingClientRect();
  const cellW = rect.width / 10;
  const cellH = rect.height / 6;

  return {
    x: pos.x * cellW + cellW / 2,
    y: pos.y * cellH + cellH / 2
  };
}

function renderLabels() {
  shops.forEach(shop => {
    const center = getCenter(areas[shop.area]);
    const pixel = toPixel(center);

    const div = document.createElement("div");
    div.className = "label";
    div.textContent = shop.name;

    div.style.left = pixel.x + "px";
    div.style.top = pixel.y + "px";

    div.onclick = () => openShop(shop);

    labelsEl.appendChild(div);
  });
}

/* ===== 一覧 ===== */
function renderList() {
  shops.forEach(shop => {
    const div = document.createElement("div");
    div.className = "shop-item";
    div.textContent = shop.name;
    div.onclick = () => openShop(shop);
    listEl.appendChild(div);
  });
}

/* ===== イベント一覧 ===== */
function renderEvents() {
  events.forEach(event => {
    const div = document.createElement("div");
    div.className = "event-item";
    div.textContent = event.title;
    div.onclick = () => openEvent(event);
    eventsEl.appendChild(div);
  });
}

/* ===== 店舗 ===== */
function openShop(shop) {
  highlightArea(shop.area);

  listEl.style.display = "none";
  eventsEl.style.display = "none";

  detailEl.innerHTML = `
    <button class="close-btn" onclick="closeDetail()">閉じる</button>
    <h2>${shop.name}</h2>
    <img src="${shop.image}" width="200">
    <p>${shop.description}</p>
  `;

  setTimeout(() => detailEl.classList.add("active"), 10);
}

/* ===== イベント ===== */
function openEvent(event) {
  highlightArea(event.area);

  listEl.style.display = "none";
  eventsEl.style.display = "none";

  detailEl.innerHTML = `
    <button class="close-btn" onclick="closeDetail()">閉じる</button>
    <h2>${event.title}</h2>
    <p>${event.description}</p>
  `;

  setTimeout(() => detailEl.classList.add("active"), 10);
}

/* ===== 閉じる ===== */
function closeDetail() {
  detailEl.classList.remove("active");

  setTimeout(() => {
    detailEl.innerHTML = "";
    listEl.style.display = "block";
    eventsEl.style.display = "block";

    document.querySelectorAll(".cell").forEach(c => {
      c.classList.remove("active");
    });

  }, 300);
}

/* ===== 初期化 ===== */
async function init() {
  const res = await fetch("data.json");
  const data = await res.json();

  areas = data.areas;
  shops = data.shops;
  events = data.events || [];

  createGrid();
  renderList();
  renderEvents();

  setTimeout(() => {
    renderLabels();
    markEventAreas();
  }, 50);
}

init();
</script>

</body>
</html>
