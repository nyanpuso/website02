<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Button Variations</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #FFFFFF;
    }

    .section {
      padding: 30px 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .title {
      text-align: center;
      margin-bottom: 20px;
      color: #666;
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

/* 光 */
.nav-btn {
  position: relative;
  display: inline-block;
  overflow: hidden;
  padding: 8px 16px;
  color: #333;
  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.1);
  transition: background 0.2s ease;
}

.nav-btn:hover {
  background: rgba(0,0,0,0.03);
}

.nav-btn::after {
  content: "";
  position: absolute;
  top: 0;
  left: -150%;
  width: 150%;
  height: 100%;

  background: linear-gradient(
    120deg,
    transparent 30%,
    rgba(0,0,0,0.08),
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.08),
    transparent 70%
  );

  transform: skewX(-20deg);
  transition: left 0.6s ease;
}

.nav-btn:hover::after {
  left: 150%;
}
  </style>
</head>
<body>

  <div class="section">
    <div class="title">CONTACT ボタンバリエーション</div>
    <div class="row">
<a href="#" class="nav-btn">CONTACT</a>
    </div>
  </div>

</body>
</html>
